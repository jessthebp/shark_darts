<!DOCTYPE html>
<html lang="en">

  <title>Shark Zone</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Shark Zone</h1>

  <script src="js/module-info.js"></script>

</html>
